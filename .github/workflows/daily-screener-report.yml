name: Daily Screener Report

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/daily-screener-report.yml"
  workflow_dispatch:
    inputs:
      screening_mode:
        description: "watchlists / all_universe / top_turnover_today / top_turnover"
        required: false
        default: "all_universe"
      screening_top_n:
        description: "Final symbols per market. 500 = 1000 JP+US symbols total."
        required: false
        default: "500"
      screening_max_symbols:
        description: "Max symbols fetched per market before selection."
        required: false
        default: "550"
      screening_usdjpy:
        description: "USDJPY used only for comparable turnover figures"
        required: false
        default: "150"
  schedule:
    - cron: "0 9 * * 1-5"
    - cron: "30 22 * * 1-5"

concurrency:
  group: daily-screener-report-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SCREENING_MODE: ${{ github.event.inputs.screening_mode || 'all_universe' }}
      SCREENING_TOP_N: ${{ github.event.inputs.screening_top_n || '500' }}
      SCREENING_MAX_SYMBOLS: ${{ github.event.inputs.screening_max_symbols || '550' }}
      SCREENING_USDJPY: ${{ github.event.inputs.screening_usdjpy || '150' }}
      YF_CHUNK_SIZE: "80"
      YF_RETRIES: "2"
      YF_FALLBACK_LIMIT: "40"
      YF_PERIOD: "18mo"
      SP500_SOURCE_URL: https://en.wikipedia.org/wiki/List_of_S%26P_500_companies
      TOPIX_INDEX_PAGE_URL: https://www.jpx.co.jp/english/markets/indices/topix/index.html
      TSE_LISTED_ISSUES_URL: https://www.jpx.co.jp/markets/statistics-equities/misc/tvdivq0000001vg2-att/data_j.xls
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run regression tests
        run: |
          python -m unittest discover -s tests -p "test_*.py"
          node --test tests/dashboard-utils.test.mjs

      - name: Refresh 1000-symbol universe
        run: |
          python scripts/update_sp500_universe.py
          python scripts/update_topix500_universe.py

      - name: Validate 1000-symbol universe
        run: python scripts/validate_universes.py

      - name: Build technical SEPA VCP report
        run: python scripts/build_report.py

      - name: Enrich external context
        run: python scripts/enrich_external_signals.py

      - name: Calculate sector relative strength
        run: python scripts/enrich_sector_strength.py

      - name: Update post-detection tracking
        run: python scripts/update_tracking.py

      - name: Validate published report
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path('reports/latest.json').read_text(encoding='utf-8'))
          total = int((report.get('summary') or {}).get('total') or 0)
          coverage = report.get('coverage') or {}
          input_by_market = report.get('inputRowsByMarket') or {}
          candidates = report.get('candidates') or []
          usable = int(coverage.get('usable') or coverage.get('downloaded') or 0)
          coverage_pct = float(coverage.get('coveragePct') or 0)
          report_size = Path('reports/latest.json').stat().st_size

          print('schemaVersion:', report.get('schemaVersion'))
          print('inputRowsByMarket:', json.dumps(input_by_market, ensure_ascii=False))
          print('coverage:', json.dumps(coverage, ensure_ascii=False))
          print('marketSummary:', json.dumps(report.get('marketSummary', {}), ensure_ascii=False))
          print('summary:', json.dumps(report.get('summary', {}), ensure_ascii=False))
          print('sectorRows:', len(report.get('sectorStrength', [])))
          print('trackingSummary:', json.dumps(report.get('trackingSummary', {}), ensure_ascii=False))
          print('reportBytes:', report_size)

          if int(report.get('schemaVersion') or 0) < 4:
              raise SystemExit('Critical schema failure: schemaVersion below 4')
          if int(input_by_market.get('JP') or 0) < 500:
              raise SystemExit('Critical universe failure: JP input below 500')
          if int(input_by_market.get('US') or 0) < 500:
              raise SystemExit('Critical universe failure: US input below 500')
          if total < 1000:
              raise SystemExit(f'Critical report failure: only {total} candidates')
          if usable < 950 or coverage_pct < 95:
              raise SystemExit(f'Critical market data failure: usable={usable}, coverage={coverage_pct}%')
          market_missing = {
              str(symbol)
              for row in (report.get('marketSummary') or {}).values()
              for symbol in (row.get('missingSymbols') or [])
          }
          coverage_missing = {str(symbol) for symbol in (coverage.get('missingSymbols') or [])}
          if market_missing != coverage_missing:
              raise SystemExit(f'Critical coverage failure: top={sorted(coverage_missing)}, market={sorted(market_missing)}')
          if not report.get('generatedAt'):
              raise SystemExit('Critical report failure: generatedAt missing')
          if sum(1 for item in candidates if item.get('market') == 'JP') != 500:
              raise SystemExit('Critical report failure: published JP rows must equal 500')
          if sum(1 for item in candidates if item.get('market') == 'US') != 500:
              raise SystemExit('Critical report failure: published US rows must equal 500')
          unnamed_jp = [
              item.get('symbol') for item in candidates
              if item.get('market') == 'JP'
              and str(item.get('name') or '').strip() in {str(item.get('code') or '').strip(), str(item.get('symbol') or '').replace('.T', '')}
          ]
          if unnamed_jp:
              raise SystemExit(f'Critical metadata failure: unnamed JP rows {unnamed_jp[:10]}')
          invalid_ranks = [
              item.get('symbol') for item in candidates
              if (item.get('rank') == 'S' and float(item.get('score') or 0) < 90)
              or (item.get('rank') == 'A' and float(item.get('score') or 0) < 80)
              or (item.get('rank') == 'B' and float(item.get('score') or 0) < 70)
              or (item.get('rank') == 'C' and float(item.get('score') or 0) < 60)
          ]
          if invalid_ranks:
              raise SystemExit(f'Critical scoring failure: invalid rank thresholds {invalid_ranks[:10]}')
          deep_vcp = [
              item.get('symbol') for item in candidates
              if item.get('setupType') == 'vcp_ready'
              and float((item.get('metrics') or {}).get('baseDepth60Pct') or 0) > 40
          ]
          if deep_vcp:
              raise SystemExit(f'Critical VCP failure: deep bases marked ready {deep_vcp[:10]}')
          if report_size > 3_500_000:
              raise SystemExit(f'Critical payload failure: report is {report_size} bytes')
          if 'candidatesByMarket' in report or 'topTurnoverByMarket' in report:
              raise SystemExit('Critical payload failure: duplicate candidate collections present')
          PY

      - name: Commit generated data
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git status --short
          git add \
            reports/latest.json \
            reports/latest.md \
            reports/sector_strength_previous.json \
            reports/sector_strength_history.json \
            reports/candidate_tracking.json \
            universes/us_sp500.csv \
            universes/jp_topix500.csv
          if git diff --cached --quiet; then
            echo "No generated data changes to commit."
            exit 0
          fi
          git commit -m "Update validated 1000-symbol screener report"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep $((attempt * 4))
          done
          echo "Push failed after retries"
          exit 1

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-screener-report
          retention-days: 14
          path: |
            reports/latest.json
            reports/latest.md
            reports/sector_strength_history.json
            reports/candidate_tracking.json
            universes/us_sp500.csv
            universes/jp_topix500.csv
            data/external_signals.csv
