name: Daily Screener Report

on:
  workflow_dispatch:
    inputs:
      screening_mode:
        description: "watchlists / top_turnover / all_universe"
        required: false
        default: "top_turnover"
      screening_top_n:
        description: "Top turnover count per market. 100 to 300. Example: 100 means JP 100 + US 100."
        required: false
        default: "100"
      screening_max_symbols:
        description: "Max symbols to fetch per market before filtering. 100 to 300."
        required: false
        default: "300"
      screening_usdjpy:
        description: "USDJPY used to compare JP turnover with US turnover"
        required: false
        default: "150"
  schedule:
    # 18:00 JST on JP weekdays. Good for Japan after-close screening.
    - cron: "0 9 * * 1-5"
    # 07:30 JST Tue-Sat. Good for US after-close screening.
    - cron: "30 22 * * 1-5"

concurrency:
  group: daily-screener-report-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest
    env:
      SCREENING_MODE: ${{ github.event.inputs.screening_mode || 'top_turnover' }}
      SCREENING_TOP_N: ${{ github.event.inputs.screening_top_n || '100' }}
      SCREENING_MAX_SYMBOLS: ${{ github.event.inputs.screening_max_symbols || '300' }}
      SCREENING_USDJPY: ${{ github.event.inputs.screening_usdjpy || '150' }}
      JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
      JQUANTS_EMAIL: ${{ secrets.JQUANTS_EMAIL }}
      JQUANTS_PASSWORD: ${{ secrets.JQUANTS_PASSWORD }}
      JQUANTS_REFRESH_TOKEN: ${{ secrets.JQUANTS_REFRESH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build report
        run: python scripts/build_report.py

      - name: Enrich sector strength
        run: python scripts/enrich_sector_strength.py

      - name: Print report diagnostics
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path('reports/latest.json').read_text(encoding='utf-8'))
          print('mode:', report.get('screeningMode'))
          print('topNPerMarket:', report.get('screeningTopNPerMarket'))
          print('maxSymbolsPerMarket:', report.get('screeningMaxSymbolsPerMarket'))
          print('marketSummary:', json.dumps(report.get('marketSummary', {}), ensure_ascii=False))
          print('summary:', json.dumps(report.get('summary', {}), ensure_ascii=False))
          print('sectorStrengthRows:', len(report.get('sectorStrength', [])))
          print('sectorStrengthPreviousAvailable:', report.get('sectorStrengthPreviousAvailable'))
          print('jquantsStatus:', json.dumps(report.get('jquantsStatus', {}), ensure_ascii=False))
          print('diagnosticsCount:', len(report.get('jquantsQuoteDiagnostics', [])))
          PY

      - name: Commit generated report
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/latest.json reports/latest.md reports/sector_strength_previous.json
          if git diff --cached --quiet; then
            echo "No report changes to commit."
            exit 0
          fi
          git commit -m "Update daily screener report"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-screener-report
          path: |
            reports/latest.json
            reports/latest.md
            reports/sector_strength_previous.json
