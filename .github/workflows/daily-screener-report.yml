name: Daily Screener Report

on:
  workflow_dispatch:
    inputs:
      screening_mode:
        description: "watchlists / top_turnover / all_universe"
        required: false
        default: "top_turnover"
      screening_top_n:
        description: "Number of candidates to keep after turnover filtering"
        required: false
        default: "50"
      screening_max_symbols:
        description: "Max universe symbols to fetch before filtering"
        required: false
        default: "100"
  schedule:
    - cron: "0 9 * * 1-5"

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest
    env:
      SCREENING_MODE: ${{ github.event.inputs.screening_mode || 'top_turnover' }}
      SCREENING_TOP_N: ${{ github.event.inputs.screening_top_n || '50' }}
      SCREENING_MAX_SYMBOLS: ${{ github.event.inputs.screening_max_symbols || '100' }}
      JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
      JQUANTS_EMAIL: ${{ secrets.JQUANTS_EMAIL }}
      JQUANTS_PASSWORD: ${{ secrets.JQUANTS_PASSWORD }}
      JQUANTS_REFRESH_TOKEN: ${{ secrets.JQUANTS_REFRESH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build report
        run: python scripts/build_report.py

      - name: Print report diagnostics
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path('reports/latest.json').read_text(encoding='utf-8'))
          print('mode:', report.get('screeningMode'))
          print('universe:', report.get('universe'))
          print('inputRows:', report.get('inputRows'))
          print('summary:', json.dumps(report.get('summary', {}), ensure_ascii=False))
          print('jquantsStatus:', json.dumps(report.get('jquantsStatus', {}), ensure_ascii=False))
          print('diagnosticsCount:', len(report.get('jquantsQuoteDiagnostics', [])))
          PY

      - name: Commit generated report
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update daily screener report
          file_pattern: reports/latest.json reports/latest.md

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-screener-report
          path: |
            reports/latest.json
            reports/latest.md
